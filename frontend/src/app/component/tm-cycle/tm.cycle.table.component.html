<div class="table-wrapper">
    <!-- Fixed tooltip rendered outside table overflow context -->
    <div class="progress-tooltip-fixed"
        *ngIf="tooltipVisible"
        [style.top.px]="tooltipPosition.top"
        [style.left.px]="tooltipPosition.left">
        <div class="tooltip-row" *ngFor="let seg of activeTooltipSegments">
            <span class="tooltip-dot" [style.background-color]="seg.color"></span>
            <span class="tooltip-label">{{ seg.result }}</span>
            <span class="tooltip-count">{{ seg.count }}</span>
        </div>
    </div>

    <div class="split-view">
        <div class="folder-sidebar">
            <div class="folder-header">
                <h3>Folders</h3>
            </div>
            <!-- <div class="folder-list">
                <div class="folder-item" [class.selected]="selectedFolder === null" (click)="selectFolder(null)">
                    <i class="fa-solid fa-folder"></i>
                    <span>Test Cycles</span>
                    <span class="folder-count">{{ testCycles.length }}</span>
                </div>
                @for (folder of folders; track folder.name) {
                <div class="folder-item" [class.selected]="selectedFolder === folder.name"
                    (click)="selectFolder(folder.name)">
                    <i class="fa-solid fa-folder"></i>
                    <span>{{ folder.name }}</span>
                    <span class="folder-count">{{ folder.count }}</span>
                    <button class="folder-delete-btn" (click)="$event.stopPropagation(); deleteFolder(folder.name)"
                        title="Delete Folder">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </div>
                }
            </div>-->
        </div>

        <ng-container *ngIf="isLoading; else notLoading">
            <div class="state-container">
                <app-loader [active]="isLoading" [delay]="3000"></app-loader>
            </div>
        </ng-container>

        <ng-template #notLoading>
            <div class="state-container" *ngIf="!isLoading && error; else checkEmpty">
                <app-error-state [error]="error"></app-error-state>
            </div>
        </ng-template>

        <ng-template #checkEmpty>
            <div class="state-container" *ngIf="cyclesDataSource.data.length === 0; else showTable">
                <app-empty-state message="No Test Cycles Found"></app-empty-state>
            </div>
        </ng-template>

        <ng-template #showTable>
            <div class="test-cycle-table">
                <table mat-table [dataSource]="cyclesDataSource">
                    <ng-container matColumnDef="KEY">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header>KEY</th>
                        <td mat-cell *matCellDef="let cycle">{{cycle.test_cycle_key}}</td>
                    </ng-container>

                    <ng-container matColumnDef="TITLE">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header>TITLE</th>
                        <td mat-cell *matCellDef="let cycle">{{cycle.title}}</td>
                    </ng-container>

                    <ng-container matColumnDef="PROGRESS">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header>PROGRESS</th>
                        <td mat-cell *matCellDef="let cycle">
                            <ng-container *ngIf="progressSummaries[cycle.test_cycle_key]?.length; else noProgress">
                                <div class="progress-bar-wrapper"
                                    (mouseenter)="showProgressTooltip($event, progressSummaries[cycle.test_cycle_key])"
                                    (mouseleave)="hideProgressTooltip()">
                                    <div class="progress-bar">
                                        <div class="progress-segment"
                                            *ngFor="let seg of progressSummaries[cycle.test_cycle_key]"
                                            [style.width.%]="seg.pct"
                                            [style.background-color]="seg.color">
                                        </div>
                                    </div>
                                </div>
                            </ng-container>
                            <ng-template #noProgress><span class="no-progress">—</span></ng-template>
                        </td>
                    </ng-container>

                    <ng-container matColumnDef="STATUS">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header>STATUS</th>
                        <td mat-cell *matCellDef="let cycle">
                            <app-status-badge [text]="(cycle.status || 'NOT_STARTED').toUpperCase()"
                                [className]="'cycle_status ' + (cycle.status || 'NOT_STARTED').toLowerCase()">
                            </app-status-badge>
                        </td>
                    </ng-container>

                    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                    <tr mat-row *matRowDef="let row; columns: displayedColumns;"
                        (click)="onCycleClick($event, row.test_cycle_key)"
                        (mousedown)="onCycleClick($event, row.test_cycle_key)">
                    </tr>
                </table>
            </div>
        </ng-template>
    </div>
</div>
