<div class="table-wrapper">
    <div class="split-view">
        <div class="execution-list-sidebar">
            <div class="execution-list-header">
                <h3>Test Executions</h3>
                <span class="execution-count">{{ executionDataSource.data.length }}</span>
            </div>
            <div class="execution-list-body">
                <div
                    *ngFor="let execution of executionDataSource.data"
                    class="execution-list-item"
                    [class.selected]="selectedExecution?.execution_key === execution.execution_key"
                    (click)="selectExecution(execution)">
                    <div class="result-bar" [style.background-color]="getResultColor(execution.result)"></div>
                    <div class="execution-item-content">
                        <span class="execution-key">{{ execution.test_case_key }}</span>
                        <span class="execution-title">{{ execution.title }}</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="execution-info-container">
            <ng-container *ngIf="isLoading; else notLoading">
                <app-loader [active]="isLoading" [delay]="3000"></app-loader>
            </ng-container>

            <ng-template #notLoading>
                <ng-container *ngIf="!isLoading && error; else checkEmpty">
                    <app-error-state [error]="error"></app-error-state>
                </ng-container>
            </ng-template>

            <ng-template #checkEmpty>
                <ng-container *ngIf="executionDataSource.data.length === 0; else showDetails">
                    <app-empty-state message="No Executions Found"></app-empty-state>
                </ng-container>
            </ng-template>

            <ng-template #showDetails>
                <app-tm-execution-detail [execution]="selectedExecution"></app-tm-execution-detail>
            </ng-template>
        </div>
    </div>
</div>
