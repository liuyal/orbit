<div class="case-header" *ngIf="testCase">
    <div class="case-header-content">
        <div class="case-header-top">
            <div class="case-header-text">
                <span class="case-key-label">{{ testCase.test_case_key }}</span>
                <h2 class="case-title">{{ testCase.title }}</h2>
            </div>
        </div>
    </div>
</div>
