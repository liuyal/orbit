<app-navbar [showBackButton]="true" [backButtonText]="'Back to Projects'"
    [backButtonAction]="goBack.bind(this)"></app-navbar>

<div class="tabs-container">
    <div class="tabs">
        <button class="tab" [class.active]="selectedTab === 'cases'" (click)="selectTab('cases')">
            <i class="fa-solid fa-flask"></i>
            CASES
        </button>
        <button class="tab" [class.active]="selectedTab === 'cycles'" (click)="selectTab('cycles')">
            <i class="fa-regular fa-rectangle-list"></i>
            CYCLES
        </button>
        <button class="tab" [class.active]="selectedTab === 'results'" (click)="selectTab('results')">
            <i class="fa-solid fa-chart-line"></i>
            RESULTS
        </button>
    </div>
</div>

<div class="test-cases-container" *ngIf="selectedTab === 'cases'">
    <app-tm-cases-table></app-tm-cases-table>
</div>

<div class="test-cycles-container" *ngIf="selectedTab === 'cycles'">
    <app-tm-cycles-table></app-tm-cycles-table>
</div>

<div class="test-results-container" *ngIf="selectedTab === 'results'">
    <app-tm-results-graph></app-tm-results-graph>
</div>
